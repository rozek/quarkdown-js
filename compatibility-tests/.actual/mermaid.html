<style>:root {
  --qd-color-bg: #ffffff;
  --qd-color-text: #1a1a1a;
  --qd-color-primary: #0066cc;
  --qd-color-border: #e0e0e0;
  --qd-color-surface: #f5f5f5;
  --qd-font-body: system-ui, sans-serif;
  --qd-font-mono: monospace;
  --qd-font-size-base: 16px;
  --qd-line-height: 1.6;
  --qd-space: 1rem;
}

.qd-document { max-width: 800px; margin: 0 auto; padding: 2rem; font-family: var(--qd-font-body); font-size: var(--qd-font-size-base); line-height: var(--qd-line-height); color: var(--qd-color-text); background: var(--qd-color-bg); }
.qd-center { display: flex; justify-content: center; text-align: center; }
.qd-row { display: flex; flex-direction: row; gap: var(--qd-space); align-items: flex-start; }
.qd-column { display: flex; flex-direction: column; gap: var(--qd-space); }
.qd-grid { display: grid; gap: var(--qd-space); grid-template-columns: repeat(var(--qd-grid-cols, 2), 1fr); }
.qd-stack { display: flex; flex-direction: column; gap: var(--qd-space); }
.qd-box { border: 1px solid var(--qd-color-border); border-radius: 4px; padding: var(--qd-space); background: var(--qd-color-surface); }
.qd-alert { border-left: 4px solid; padding: 0.75rem 1rem; border-radius: 0 4px 4px 0; margin: 1rem 0; }
.qd-alert--info { border-color: #0066cc; background: #e8f0fe; }
.qd-alert--warning { border-color: #f59e0b; background: #fef3c7; }
.qd-alert--error { border-color: #dc2626; background: #fee2e2; }
.qd-alert--success { border-color: #16a34a; background: #dcfce7; }
.qd-collapsible summary { cursor: pointer; font-weight: bold; }
.qd-tabs { border: 1px solid var(--qd-color-border); border-radius: 4px; overflow: hidden; }
.qd-pagebreak { page-break-after: always; break-after: page; }
.qd-space { height: var(--qd-space); }
.qd-figure { margin: 1.5rem auto; text-align: center; }
.qd-toc { margin: 1.5rem 0; padding: 1rem; background: var(--qd-color-surface); border-radius: 4px; }
.qd-toc ol { padding-left: 1.5rem; }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css">
<div class="qd-document qd-plain">
<h1 class="page-break" id="mermaid">Mermaid</h1>
<h2 id="xy-chart">XY Chart</h2>
<p>.1::pow {2}::divide {100}</p>
<p>.1::logn::multiply {10}</p>
<h2 id="class-diagram">Class Diagram</h2>
<figure><pre class="mermaid">classDiagram
    class Bank {
        +name: string
        +address: string
    }

    class Customer {
        +name: string
        +id: int
    }

    class BankAccount {
        &#x3C;&#x3C;interface>>
        +id: int
        +balance: double
        +deposit(amount: double)
        +withdraw(amount: double)
    }

    class Transaction {
        +amount: double
        +date: date
        +execute()
    }

    class Loan {
        +id: int
        +amount: double
        +interestRate: double
        +approve()
    }

Bank "1" o-- "*" Customer : manages
Customer "1" --> "*" BankAccount : owns
Customer "1" --> "*" Loan : has
BankAccount "1" --> "*" Transaction : records
</pre><figcaption class="caption-bottom">Class diagram of a bank system</figcaption></figure>
<h2 id="sequence-diagram">Sequence Diagram</h2>
<figure><pre class="mermaid">sequenceDiagram
    Alice ->> Bob: Hello Bob, how are you?
    alt sick
        Bob ->> Alice: Not so good :(
    else well
        Bob ->> Alice: Feeling fresh like a daisy.
    end

    opt
        Bob ->> Alice: Thanks for asking!
    end
</pre><figcaption class="caption-bottom">Sequence diagram of a communication</figcaption></figure>
<h2 id="flowchart">Flowchart</h2>
<figure><pre class="mermaid">flowchart TD
    A([Start]) --> B[Enter username and password]
    B --> C{Correct?}
    C -- Yes --> D[Redirect to dashboard]
    C -- No --> E[Show error message]
    D --> F([END])
    E --> F
</pre><figcaption class="caption-bottom">Flowchart of the dashboard</figcaption></figure>
<h2 id="git-graph">Git Graph</h2>
<figure><pre class="mermaid">gitGraph:
    commit "Ashish"
    branch newbranch
    checkout newbranch
    commit id:"1111"
    commit tag:"test"
    checkout main
    commit type: HIGHLIGHT
    commit
    merge newbranch
    commit
    branch b2
    commit
</pre><figcaption class="caption-bottom">Graph of a Git repository</figcaption></figure>
<h2 id="pie-chart">Pie Chart</h2>
<figure><pre class="mermaid">pie showData
    "Sleep" : 8
    "Work" : 9
    "Exercise" : 1
    "Leisure" : 4
    "Meals" : 2
</pre><figcaption class="caption-bottom">Pie chart of a daily routine</figcaption></figure>
